<nav class="sidebar" [class.expanded]="isExpanded">
  
  <button class="toggle-btn" (click)="toggle()">
    <i class="pi" [ngClass]="isExpanded ? 'pi-angle-left' : 'pi-angle-right'">
    </i>
  </button>

  <div class="logo-container">
    <img src="assets/logo4.png" alt="Lava Jato Logo" />
    <span class="label">AUTO BRILHO</span>
  </div>

  <a routerLink="/dashboard" routerLinkActive="active">
    <i class="pi pi-home"></i>
    <span class="label">Dashboard</span>
  </a>

  <a routerLink="/customers" routerLinkActive="active">
    <i class="pi pi-users"></i>
    <span class="label">Clientes</span>
  </a>

  <a routerLink="/services" routerLinkActive="active">
    <i class="pi pi-briefcase"></i>
    <span class="label">Serviços</span>
  </a>
</nav>
